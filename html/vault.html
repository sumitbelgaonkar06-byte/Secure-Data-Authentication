<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT // SECURE_AUTH</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .dashboard-container { display: flex; width: 100%; height: 100vh; background-color: #080808; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        .nav-link { display: block; color: var(--text-muted); text-decoration: none; padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; transition: all 0.2s ease; font-weight: 500; }
        .nav-link:hover, .nav-link.active { background-color: rgba(59, 130, 246, 0.15); color: var(--primary-blue); }
        
        .main-content { padding: 40px; flex-grow: 1; overflow-y: auto; }
        .vault-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 30px; }
        
        .card { 
            background: rgba(18, 18, 18, 0.95); 
            border: 1px solid rgba(59, 130, 246, 0.3); 
            border-radius: 12px; 
            padding: 30px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
        }

        .card-header { font-size: 18px; color: var(--primary-blue); margin-bottom: 20px; font-weight: bold; letter-spacing: 1px; display: flex; align-items: center; justify-content: space-between;}
        
        .form-label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        input[type="file"], input[type="password"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            color: white;
            border-radius: 6px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        button {
            width: 100%; padding: 14px; border-radius: 6px; cursor: pointer; font-weight: bold;
            transition: all 0.3s ease; border: none; letter-spacing: 1px;
        }
        
        .btn-encrypt { background-color: var(--primary-blue); color: white; }
        .btn-encrypt:hover { background-color: #2563eb; }
        
        .btn-decrypt { background-color: #10b981; color: white; }
        .btn-decrypt:hover { background-color: #059669; }

        .status-box { margin-top: 15px; font-size: 12px; color: #10b981; text-align: center; height: 15px;}
    </style>
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar" style="width: 250px; padding: 30px; border-right: 1px solid rgba(255,255,255,0.1);">
            <div>
                <h1 style="margin: 0; font-size: 22px; letter-spacing: 1px; color: var(--primary-blue);">SECURE_AUTH</h1>
                <p style="color: var(--text-muted); font-size: 12px; margin-top: 4px;">ENTERPRISE SYSTEM v2.0</p>
                <br><br>
                <nav>
                    <a href="dashboard.html" class="nav-link">Dashboard Overview</a>
                    <a href="hash.html" class="nav-link">Data Hash Generator</a>
                    <a href="signature.html" class="nav-link">Digital Signature</a>
                    <a href="verify.html" class="nav-link">Verify Integrity</a>
                    <a href="ledger.html" class="nav-link">Blockchain Ledger</a>
                    <a href="vault.html" class="nav-link active">The Vault (AES-256)</a>
                    <a href="merkle.html" class="nav-link active">Merkle Tree</a>
                    <a href="audit.html" class="nav-link active">Security Audit Log</a>
                    <a href="steganography.html" class="nav-link active">Steganography</a>
                </nav>
            </div>
        </aside>

        <main class="main-content">
            <header style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px;">
                <h2 style="font-size: 28px; margin: 0;">AES-256 SECURE VAULT</h2>
                <p style="color: var(--text-muted); margin-top: 5px; font-size: 14px;">Military-Grade File Encryption & Decryption</p>
            </header>

            <div class="vault-grid">
                <div class="card">
                    <div class="card-header">
                        <span>> ENCRYPT_FILE</span>
                        <span>🔒</span>
                    </div>
                    <label class="form-label">Target File</label>
                    <input type="file" id="enc-file">
                    
                    <label class="form-label">Encryption Passkey</label>
                    <input type="password" id="enc-password" placeholder="Enter a strong passkey...">
                    
                    <button class="btn-encrypt" onclick="encryptFile()">LOCK & DOWNLOAD</button>
                    <div id="enc-status" class="status-box"></div>
                </div>

                <div class="card" style="border-color: rgba(16, 185, 129, 0.3);">
                    <div class="card-header" style="color: #10b981;">
                        <span>> DECRYPT_FILE</span>
                        <span>🔓</span>
                    </div>
                    <label class="form-label">Encrypted Target (.enc)</label>
                    <input type="file" id="dec-file">
                    
                    <label class="form-label">Decryption Passkey</label>
                    <input type="password" id="dec-password" placeholder="Enter original passkey...">
                    
                    <button class="btn-decrypt" onclick="decryptFile()">UNLOCK FILE</button>
                    <div id="dec-status" class="status-box" style="color: #ef4444;"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- CRYPTOGRAPHY ENGINE ---

        // Helper: Turn a password into a 256-bit AES Master Key
        async function getDerivationKey(password) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                "raw", enc.encode(password), {name: "PBKDF2"}, false, ["deriveKey"]
            );
            // We use a static salt for simplicity in this student project, 
            // but PBKDF2 makes it highly secure against brute force.
            const salt = enc.encode("SecureAuthProjectSalt");
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
            );
        }

        // ENCRYPT FUNCTION
        async function encryptFile() {
            const fileInput = document.getElementById('enc-file');
            const password = document.getElementById('enc-password').value;
            const status = document.getElementById('enc-status');

            if (fileInput.files.length === 0 || !password) {
                status.innerText = "Error: File and Passkey required.";
                status.style.color = "#ef4444";
                return;
            }

            status.innerText = "Encrypting data... Please wait.";
            status.style.color = "var(--primary-blue)";

            try {
                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();
                
                // Generate Crypto Key and random 12-byte IV (Initialization Vector)
                const key = await getDerivationKey(password);
                const iv = crypto.getRandomValues(new Uint8Array(12));

                // Perform AES-GCM Encryption
                const encryptedContent = await crypto.subtle.encrypt(
                    { name: "AES-GCM", iv: iv }, key, arrayBuffer
                );

                // Combine the IV and Encrypted Data into one file so we can read it later
                const finalBlob = new Blob([iv, encryptedContent], {type: "application/octet-stream"});
                
                // Trigger Download
                const downloadLink = document.createElement('a');
                downloadLink.href = URL.createObjectURL(finalBlob);
                downloadLink.download = file.name + ".encrypted";
                downloadLink.click();

                status.innerText = "SUCCESS: File locked and downloaded.";
                status.style.color = "#10b981";
            } catch (e) {
                console.error(e);
                status.innerText = "CRITICAL ERROR: Encryption failed.";
                status.style.color = "#ef4444";
            }
        }

        // DECRYPT FUNCTION
        async function decryptFile() {
            const fileInput = document.getElementById('dec-file');
            const password = document.getElementById('dec-password').value;
            const status = document.getElementById('dec-status');

            if (fileInput.files.length === 0 || !password) {
                status.innerText = "Error: Encrypted file and Passkey required.";
                return;
            }

            status.innerText = "Attempting decryption...";
            status.style.color = "var(--primary-blue)";

            try {
                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();
                
                // Separate the 12-byte IV from the rest of the encrypted data
                const iv = arrayBuffer.slice(0, 12);
                const encryptedContent = arrayBuffer.slice(12);
                
                // Generate Crypto Key from password
                const key = await getDerivationKey(password);

                // Perform AES-GCM Decryption
                const decryptedContent = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv }, key, encryptedContent
                );

                // Restore original filename by removing ".encrypted"
                let originalName = file.name.replace(".encrypted", "");

                // Trigger Download
                const finalBlob = new Blob([decryptedContent]);
                const downloadLink = document.createElement('a');
                downloadLink.href = URL.createObjectURL(finalBlob);
                downloadLink.download = originalName;
                downloadLink.click();

                status.innerText = "SUCCESS: Access granted. File unlocked.";
                status.style.color = "#10b981";
            } catch (e) {
                console.error(e);
                status.innerText = "ACCESS DENIED: Incorrect Passkey or corrupted file.";
                status.style.color = "#ef4444";
            }
        }
    </script>
</body>
</html>
