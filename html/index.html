<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE_AUTH // TERMINAL_LOGIN</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Symmetrical Centering */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #080808; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 420px; 
            perspective: 1000px;
        }

        .login-box {
            background: rgba(18, 18, 18, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 16px;
            padding: 45px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(59, 130, 246, 0.1);
            backdrop-filter: blur(12px);
        }

        .glitch {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--primary-blue);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 22px;
            width: 100%;
        }

        .form-label {
            display: block;
            font-size: 10px;
            color: var(--primary-blue);
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Updated to handle text and telephone inputs seamlessly */
        input[type="text"], input[type="tel"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box; 
            transition: all 0.3s ease;
            outline: none;
            -webkit-appearance: none; /* Removes default browser lines/shadows */
        }

        input[type="text"]:focus, input[type="tel"]:focus {
            border-color: var(--primary-blue);
            background: rgba(59, 130, 246, 0.05);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 15px;
        }

        button:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h1 class="glitch">> SYSTEM_ACCESS</h1>
            <p class="subtitle">Local Authentication Gateway</p>
            
            <div id="login-form">
                <div class="input-group">
                    <label class="form-label">> OPERATOR_NAME</label>
                    <input type="text" id="username" placeholder="Enter your name...">
                </div>

                <div class="input-group">
                    <label class="form-label">> MOBILE_NUMBER</label>
                    <input type="tel" id="mobileNumber" placeholder="Enter 10-digit number...">
                </div>

                <button onclick="login()">AUTHORIZE SYSTEM</button>
            </div>
        </div>
    </div>

    <script>
        // Extremely simple local login logic
        function login() {
            const name = document.getElementById('username').value.trim();
            const mobile = document.getElementById('mobileNumber').value.trim();
            
            // Basic validation for both fields
            if (name === "" || mobile === "") {
                alert("ACCESS DENIED: Please provide Operator Name and Mobile Number.");
                return;
            }

            // Save the name to browser memory so the Dashboard can say "Welcome, [Name]"
            localStorage.setItem("operatorName", name);

            // Instantly redirect to the dashboard
            window.location.href = "dashboard.html";
        }

        // Allow pressing "Enter" to log in
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
